<div class="overlay">
  <div class="popup">
    <div class="popup-header">
      <h2>Gia Phả Họ Đỗ</h2>
      <p>Xuân Thượng</p>
    </div>
    <div class="popup-body">
      <label for="phoneInput">Số điện thoại</label>
      <input
        id="phoneInput"
        type="tel"
        [(ngModel)]="phone"
        placeholder="VD: 0912345678"
        (keyup.enter)="passwordInput.focus()"
        autofocus
      />

      <label for="passwordInput">Mật khẩu</label>
      <input
        #passwordInput
        id="passwordInput"
        type="password"
        [(ngModel)]="password"
        placeholder="Nhập mật khẩu"
        (keyup.enter)="submit()"
      />

      <button class="btn-primary" (click)="submit()" [disabled]="!canSubmit() || loading">
        {{ loading ? 'Đang đăng nhập...' : 'Đăng nhập' }}
      </button>

      <p class="error-msg" *ngIf="errorMessage">{{ errorMessage }}</p>
      <p class="success-msg" *ngIf="successMessage">{{ successMessage }}</p>

      <div class="divider">
        <span>Hoặc</span>
      </div>

      <button class="btn-secondary" (click)="goRegister()">
        Đăng ký tài khoản
      </button>
    </div>
  </div>
</div>
